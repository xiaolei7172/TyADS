spring:
  application:
    name: adg-rule
  profiles:
    active: prod  #切换至 dev 即可输出调试信息

logging:
  file:
    path: ./logs

application:
  config:
    expected_quantity: 2000000  #预期规则数量
    fault_tolerance: 0.001 #容错率
    warn_limit: 7 #警告阈值, 规则长度小于该值时会输出警告日志
    batch_size: 10000 #写入文件的批次大小

  # 规则源配置，remote为远程规则，local为本地规则，支持多个规则源
  rule:

    # 仅支持 http/https，不限定响应内容格式
    remote:
      - name: 'AdGuard官方核心规则' # AdGuard官方核心规则
        path: 'https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_2_Base/filter.txt'
      - name: 'AdGuard官方中文规则' # AdGuard官方中文规则
        path: 'https://raw.githubusercontent.com/AdguardTeam/FiltersRegistry/master/filters/filter_224_Chinese/filter.txt'
      - name: '智能电视/机顶盒广告规则' # 智能电视/机顶盒广告规则
        path: 'https://perflyst.github.io/PiHoleBlocklist/SmartTV-AGH.txt'
      #- name: 'EasyList官方通用规则' # EasyList官方通用规则
       # path: 'https://easylist-downloads.adblockplus.org/easylist.txt'
      #- name: 'EasyList中文分支规则' # EasyList中文分支规则
       # path: 'https://easylist-downloads.adblockplus.org/easylistchina.txt'
      #- name: '隐私保护规则' # 隐私保护规则
      #  path: 'https://easylist-downloads.adblockplus.org/easyprivacy.txt'
      #- name: '拦截诱导APP下载规则' # 拦截诱导APP下载规则
      #  path: 'https://raw.githubusercontent.com/Noyllopa/NoAppDownload/master/NoAppDownload.txt'
      - name: '轻量通用广告拦截规则' # 轻量通用广告拦截规则
        path: 'https://raw.githubusercontent.com/sjhgvr/oisd/main/abp_small.txt'
      - name: 'AWAvenue 秋风广告规则' # 国内定制广告规则
        path: 'https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/AWAvenue-Ads-Rule.txt'
      - name: '乘风 广告过滤规则' # 老牌中文广告规则
        path: 'https://raw.githubusercontent.com/xinggsf/Adblock-Plus-Rule/master/rule.txt'
      - name: 'DD-AD 私人规则' # 国内移动端广告规则
        path: 'https://raw.githubusercontent.com/afwfv/DD-AD/main/rule/DD-AD.txt'
      - name: '轻量广告拦截规则' # 广告接口拦截规则
        path: 'https://raw.githubusercontent.com/damengzhu/banad/main/jiekouAD.txt'
      - name: 'HG1 Rule' # 综合广告/弹窗拦截规则
        path: 'https://raw.githubusercontent.com/2771936993/HG/main/hg1.txt'
     # - name: '个人私有规则' # 个性化广告/弹窗拦截规则
     #   path: 'https://raw.githubusercontent.com/qq5460168/666/master/rules.txt'
      - name: 'cjx annoyance' # 网页烦扰元素拦截规则
        path: 'https://raw.githubusercontent.com/cjx82630/cjxlist/master/cjx-annoyance.txt'
      - name: '番茄规则' # 番茄屠龙刀规则
        path: 'https://raw.githubusercontent.com/changzhaoCZ/fqnovel-adrules/refs/heads/main/fqnovel-fxxk_ads'
      - name: 'anti-ad' # anti-ad规则
        path: ' https://anti-ad.net/adguard.txt'
      - name: 'SMAdHosts' # M广告丟那吗hosts
        path: ' https://raw.githubusercontent.com/2Gardon/SM-Ad-FuckU-hosts/master/SMAdHosts'
      - name: 'Y-hosts' # hosts
        path: ' https://raw.githubusercontent.com/VeleSila/yhosts/master/hosts.txt'
      #- name: '游戏规则' # 此规则游戏拦截
      #  path: ' http://hgzs.uunat.com/yx.txt'
      #- name: 'DD-AD 完整规则' 
       # path: 'https://raw.githubusercontent.com/afwfv/DD-AD/refs/heads/release/easylist.txt'


    #本地规则请将文件放置到项目路径rule目录中
    local:
#      - name: 'local rule'
#        path: 'local-rule.txt'
  output:
    file_header: |  #输出文件头, 占位符${name}将被替换为文件名，如all.txt,  ${date} 将被替换为当前日期
      [天影-自用规则 Adblock List]
      ! ------------------------------------------------
      ! Title: 天影自用规则-当前规则：${name}
      ! 更新时间: ${date}
      ! 项目地址: https://github.com/xiaolei7172/TyADS
      ! 说   明: 整合个人喜爱规则，可能有误杀，介意勿用
      ! ------------------------------------------------
    path: rule   #规则文件输出路径，相对路径默认从 项目目录开始
    files:
       all.txt: #输出文件名
        - DOMAIN  #域名规则，仅完整域名
        - REGEX   #正则规则，包含正则的域名规则，AdGH支持
        - MODIFY  #修饰规则，添加了一些修饰符号的规则，AdG支持
        - HOSTS   #Hosts规则
       dns.txt:
        - DOMAIN
        - REGEX
        - HOSTS
       hosts.txt:
        - HOSTS
       regex.txt:
        - REGEX
       domain.txt:
        - DOMAIN
       modify.txt:
        - MODIFY
