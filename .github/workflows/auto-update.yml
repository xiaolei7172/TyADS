name: Update Filters
on:
  push:
    paths-ignore:
      - 'README.md'
      - 'README_en.md'
      - '.github/**'
      - '.devcontainer/**'
      - 'LICENSE'
  # 每8小时自动更新（UTC时区，北京时间+8小时）
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
    inputs:
      profile:
        required: false
        default: 'prod'
        type: string
        description: 'Application running profile'
      release-branch:
        required: false
        default: ''
        type: string
        description: 'Release branch name'

env:
  TZ: Asia/Shanghai

jobs:
  Update_Filters:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref }}

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Set default values
        id: defaults
        run: |
          echo "profile=${{ github.event.inputs.profile || 'prod' }}" >> $GITHUB_OUTPUT
          echo "release-branch=${{ github.event.inputs.release-branch || '' }}" >> $GITHUB_OUTPUT
          # 新增：提前拼接提交信息，避免YAML表达式复杂语法
          if [ -n "${{ github.event.inputs.release-branch }}" ]; then
            echo "commit_msg=chore: auto release at ${{ steps.date.outputs.date }}" >> $GITHUB_OUTPUT
          else
            echo "commit_msg=chore: auto update rules (8h interval)" >> $GITHUB_OUTPUT
          fi

      # 清空旧规则文件（删除后重建）
      - name: Clean old rule files
        run: |
          if [ -d "rule" ]; then
            rm -rf rule/*
            echo "✅ 已清空rule目录下所有原有规则文件"
          else
            mkdir -p rule
            echo "✅ 已创建rule目录"
          fi

      # 运行程序生成新规则
      - name: Run Jar
        run: mvn spring-boot:run -Dspring-boot.run.profiles=${{ steps.defaults.outputs.profile }}
        timeout-minutes: 10

      - name: Upload parser log
        uses: actions/upload-artifact@v7
        with:
          name: parser.log
          path: logs/parser.log

      # release分支专属清理逻辑
      - name: Clean up for release
        if: ${{ steps.defaults.outputs.release-branch != '' }}
        run: |
          find . -maxdepth 1 ! -name 'rule' ! -name '.' ! -name '.git' -exec rm -rf {} +
          mv rule/* .
          rm -rf rule

      - name: Set current date
        id: date
        if: ${{ steps.defaults.outputs.release-branch != '' }}
        run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

      # 修复语法错误的提交步骤
      - name: Commit Changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          # 改用提前生成的简单变量，避免复杂表达式
          commit_message: ${{ steps.defaults.outputs.commit_msg }}
          # 提交分支（简化表达式格式）
          branch: ${{ steps.defaults.outputs.release-branch != '' && steps.defaults.outputs.release-branch || github.ref_name }}
          # 仅跟踪rule目录变更
          file_pattern: 'rule/**'
          # 仅release分支启用强制推送（简化表达式）
          push_options: ${{ steps.defaults.outputs.release-branch != '' && '--force' || '' }}
          # 仅release分支启用以下参数（统一表达式格式）
          create_branch: ${{ steps.defaults.outputs.release-branch != '' }}
          skip_dirty_check: ${{ steps.defaults.outputs.release-branch != '' }}
          skip_fetch: ${{ steps.defaults.outputs.release-branch != '' }}
          skip_checkout: ${{ steps.defaults.outputs.release-branch != '' }}
          commit_options: ${{ steps.defaults.outputs.release-branch != '' && '--allow-empty' || '' }}

      # 删除旧Workflow运行记录
      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 1
