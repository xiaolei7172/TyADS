name: Update Filters
on:
  # 保留原有 push 触发规则
  push:
    paths-ignore:
      - 'README.md'
      - 'README_en.md'
      - '.github/**'
      - '.devcontainer/**'
      - 'LICENSE'
    branches: [ main ]
  # 保留手动触发
  workflow_dispatch:
  # 核心修改：每8小时触发一次（UTC时区，对应北京时间需+8小时）
  schedule:
    # cron表达式：分 时 日 月 周 → */8 表示每8小时执行一次
    - cron: '0 */8 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  Update_Filters:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      
    steps:
      - uses: actions/checkout@v3
        # 拉取完整历史，避免提交冲突
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Jar
        run: mvn spring-boot:run
        # 超时保护：10分钟未完成则终止
        timeout-minutes: 10

      - name: Commit Changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 🚀 CI Updated (Auto/Manual/Push)
          # 仅提交规则文件，避免误操作
          file_pattern: 'rule/**/*.txt'
          commit_user_name: GitHub Actions
          commit_user_email: actions@github.com
          commit_author: GitHub Actions <actions@github.com>

      - name: GitHub Push
        if: steps.commit.outputs.changes_detected == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          branch: ${{github.ref}}

      - name: Mirror Refresh
        # 仅文件变更时刷新 jsdelivr 缓存
        if: steps.commit.outputs.changes_detected == 'true'
        run: sleep 10 && curl 'https://purge.jsdelivr.net/gh/${{github.repository}}/rule'

      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 1
