name: Update Filters
on:
  # 1. 保留原有 push 触发规则（排除指定文件、仅 main 分支）
  push:
    paths-ignore:
      - 'README.md'
      - 'README_en.md'
      - '.github/**'
      - '.devcontainer/**'
      - 'LICENSE'
    branches: [ main ]
  # 2. 保留手动触发
  workflow_dispatch:
  # 3. 新增定时触发（核心：自动更新规则）
  schedule:
    # cron 表达式（UTC 时区，以下示例为 北京时间每天凌晨2点执行）
    # 格式：分 时 日 月 周，UTC+8=北京时间，所以 UTC 18点 = 北京时间 2点
    - cron: '0 18 * * *'

env:
  TZ: Asia/Shanghai

jobs:
  Update_Filters:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
      
    steps:
      - uses: actions/checkout@v3
        # 新增：拉取完整历史（避免提交时冲突）
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run Jar
        run: mvn spring-boot:run
        # 可选：增加超时时间（防止规则拉取耗时过长中断）
        timeout-minutes: 10

      - name: Commit Changes
        id: commit
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: 🚀 CI Updated (Auto/Manual/Push)
          # 明确提交的文件范围（仅规则文件，避免误提交）
          file_pattern: 'rule/**/*.txt'
          # 配置提交用户信息（可选，默认用 GitHub Actions 账号）
          commit_user_name: GitHub Actions
          commit_user_email: actions@github.com
          commit_author: GitHub Actions <actions@github.com>

      - name: GitHub Push
        if: steps.commit.outputs.changes_detected == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{secrets.GITHUB_TOKEN}}
          branch: ${{github.ref}}

      - name: Mirror Refresh
        # 仅当有文件变更时刷新 jsdelivr 缓存
        if: steps.commit.outputs.changes_detected == 'true'
        run: sleep 10 && curl 'https://purge.jsdelivr.net/gh/${{github.repository}}/rule'

      - name: Delete Workflow Runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{secrets.GITHUB_TOKEN}}
          repository: ${{ github.repository }}
          retain_days: 1
          keep_minimum_runs: 1
